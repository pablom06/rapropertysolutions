<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Photos - RA Property Solutions</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; color: #222; }
        .container { max-width: 600px; margin: 0 auto; padding: 2rem; }
        h1 { color: #1a3a5c; margin-bottom: 0.5rem; }
        p.sub { color: #666; margin-bottom: 2rem; }

        #login-section, #upload-section { background: #fff; padding: 2rem; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 2rem; }
        #upload-section { display: none; }

        label { display: block; font-weight: 600; margin-bottom: 0.5rem; color: #1a3a5c; }
        input, select, textarea { width: 100%; padding: 0.7rem; border: 1px solid #ddd; border-radius: 4px; font-size: 1rem; margin-bottom: 1rem; font-family: inherit; }
        input:focus, select:focus { outline: none; border-color: #1a3a5c; }

        .btn { background: #e8a838; color: #222; padding: 0.8rem 2rem; border: none; border-radius: 4px; font-size: 1rem; font-weight: 600; cursor: pointer; width: 100%; }
        .btn:hover { background: #d4952e; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }

        .file-input-wrapper { border: 2px dashed #ddd; border-radius: 8px; padding: 2rem; text-align: center; margin-bottom: 1rem; cursor: pointer; transition: border-color 0.3s; }
        .file-input-wrapper:hover { border-color: #1a3a5c; }
        .file-input-wrapper input { display: none; }
        .file-input-wrapper p { color: #666; }

        .preview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 0.5rem; margin-bottom: 1rem; }
        .preview-grid img { width: 100%; height: 100px; object-fit: cover; border-radius: 4px; }

        .status { padding: 1rem; border-radius: 4px; margin-bottom: 1rem; display: none; }
        .status.success { display: block; background: #d4edda; color: #155724; }
        .status.error { display: block; background: #f8d7da; color: #721c24; }
        .status.info { display: block; background: #d1ecf1; color: #0c5460; }

        .photo-type-row { display: flex; gap: 1rem; margin-bottom: 1rem; }
        .photo-type-row label { display: flex; align-items: center; gap: 0.3rem; cursor: pointer; }
        .photo-type-row input { width: auto; margin: 0; }

        .uploaded-list { margin-top: 1rem; }
        .uploaded-item { display: flex; align-items: center; gap: 1rem; padding: 0.5rem; background: #f5f5f5; border-radius: 4px; margin-bottom: 0.5rem; }
        .uploaded-item img { width: 60px; height: 60px; object-fit: cover; border-radius: 4px; }
        .uploaded-item .info { flex: 1; }
        .uploaded-item .info small { color: #666; }
        .delete-btn { background: #e74c3c; color: white; border: none; padding: 0.3rem 0.6rem; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
        .edit-btn { background: #1a3a5c; color: white; border: none; padding: 0.3rem 0.6rem; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
        .btn-group { display: flex; gap: 0.3rem; }

        .project-group { background: #f5f5f5; border-radius: 6px; margin-bottom: 0.8rem; overflow: hidden; }
        .project-group-header { display: flex; justify-content: space-between; align-items: center; padding: 0.7rem 1rem; }
        .project-group-header strong { display: block; color: #1a3a5c; }
        .project-group-header small { color: #888; font-size: 0.8rem; }
        .project-group-thumbs { display: flex; gap: 2px; background: #ddd; }
        .project-group-thumbs img { width: 80px; height: 60px; object-fit: cover; display: block; }
        .more-count { display: flex; align-items: center; justify-content: center; min-width: 50px; background: #1a3a5c; color: white; font-size: 0.8rem; font-weight: 600; }

        .reorder-btn { background: #1a3a5c; color: white; border: none; padding: 0.3rem 0.6rem; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
        .reorder-photos { display: none; padding: 0.5rem; background: #eee; }
        .reorder-photos.active { display: block; }
        .reorder-item { display: flex; align-items: center; gap: 0.5rem; padding: 0.4rem; background: white; border-radius: 4px; margin-bottom: 0.3rem; }
        .reorder-item img { width: 60px; height: 45px; object-fit: cover; border-radius: 3px; }
        .reorder-item .reorder-info { flex: 1; font-size: 0.8rem; color: #666; }
        .reorder-arrows { display: flex; flex-direction: column; gap: 2px; }
        .reorder-arrows button { background: #ddd; border: none; padding: 0.2rem 0.5rem; cursor: pointer; border-radius: 3px; font-size: 0.7rem; }
        .reorder-arrows button:hover { background: #ccc; }

        .testimonials-admin { background: #fff; padding: 2rem; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 2rem; display: none; }
        .testimonials-admin h2 { color: #1a3a5c; margin-bottom: 1rem; }
        .t-tabs { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
        .t-tab { background: #eee; border: none; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; font-weight: 600; color: #555; }
        .t-tab.active { background: #1a3a5c; color: white; }
        .t-tab .count { display: inline-block; background: rgba(255,255,255,0.3); padding: 0 0.4rem; border-radius: 10px; font-size: 0.75rem; margin-left: 0.3rem; }
        .t-tab:not(.active) .count { background: #1a3a5c; color: white; }
        .t-item { background: #f7f7f7; border-radius: 6px; padding: 0.9rem 1rem; margin-bottom: 0.7rem; }
        .t-item.pending { border-left: 4px solid #e8a838; }
        .t-item.approved { border-left: 4px solid #27ae60; }
        .t-item-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem; margin-bottom: 0.4rem; flex-wrap: wrap; }
        .t-item .author { font-weight: 600; color: #1a3a5c; }
        .t-item .meta { font-size: 0.8rem; color: #777; }
        .t-item .stars { color: #e8a838; margin: 0.2rem 0 0.4rem; }
        .t-item .text { color: #444; line-height: 1.45; white-space: pre-wrap; }
        .t-item .actions { display: flex; gap: 0.4rem; margin-top: 0.5rem; }
        .t-empty { color: #888; padding: 1rem; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Upload Work Photos</h1>
        <p class="sub">Upload before/after and project photos from your phone.</p>

        <div id="login-section">
            <label for="password">Enter Password</label>
            <input type="password" id="password" placeholder="Upload password">
            <button class="btn" onclick="login()">Login</button>
            <div id="login-status" class="status"></div>
        </div>

        <div id="upload-section">
            <div id="upload-status" class="status"></div>

            <label for="category">Category</label>
            <select id="category" onchange="toggleCustomCategory()">
                <option value="appliance-install">Appliance Install</option>
                <option value="appliance-repair">Appliance Repair</option>
                <option value="bathrooms">Bathrooms</option>
                <option value="electrical">Electrical</option>
                <option value="flooring">Flooring</option>
                <option value="foundation">Foundation</option>
                <option value="general">General</option>
                <option value="handyman">Handyman</option>
                <option value="hvac">HVAC</option>
                <option value="kitchens">Kitchens</option>
                <option value="landscaping">Landscaping</option>
                <option value="plumbing">Plumbing</option>
                <option value="powerwashing">Powerwashing</option>
                <option value="rehab">Rehabs</option>
                <option value="roofing">Roofing</option>
                <option value="turns">Turns & Make-Readies</option>
                <option value="underground-plumbing">Underground Plumbing</option>
                <option value="windows">Windows</option>
                <option value="__custom__">+ New Category...</option>
            </select>
            <input type="text" id="customCategory" placeholder="Enter new category name" style="display:none">

            <label for="title">Project Title <span style="color:#e74c3c">*</span></label>
            <input type="text" id="title" placeholder="e.g. Replaced Evap Coil" required>

            <label>Photo Type</label>
            <div class="photo-type-row">
                <label><input type="radio" name="photoType" value="single" checked onchange="togglePhotoType()"> Single Photo</label>
                <label><input type="radio" name="photoType" value="beforeafter" onchange="togglePhotoType()"> Before & After</label>
            </div>

            <div id="single-upload">
                <div class="file-input-wrapper" onclick="document.getElementById('files').click()">
                    <input type="file" id="files" accept="image/*" multiple>
                    <p>Tap to select photos or take a picture</p>
                </div>
                <div class="preview-grid" id="preview"></div>
            </div>

            <div id="beforeafter-upload" style="display:none">
                <label style="color:#e74c3c">Before Photo</label>
                <div class="file-input-wrapper" onclick="document.getElementById('beforeFiles').click()">
                    <input type="file" id="beforeFiles" accept="image/*" multiple>
                    <p>Tap to select BEFORE photos</p>
                </div>
                <div class="preview-grid" id="beforePreview"></div>

                <label style="color:#27ae60">After Photo</label>
                <div class="file-input-wrapper" onclick="document.getElementById('afterFiles').click()">
                    <input type="file" id="afterFiles" accept="image/*" multiple>
                    <p>Tap to select AFTER photos</p>
                </div>
                <div class="preview-grid" id="afterPreview"></div>
            </div>

            <button class="btn" id="uploadBtn" onclick="uploadPhotos()" disabled>Upload Photos</button>

            <div class="uploaded-list" id="uploadedList">
                <h3 style="margin: 1rem 0; color: #1a3a5c;">Recently Uploaded</h3>
                <div id="recentPhotos"></div>
            </div>

        </div>

        <div class="testimonials-admin" id="testimonials-admin">
            <h2>Customer Testimonials</h2>
            <div class="t-tabs">
                <button type="button" class="t-tab active" data-tab="pending" onclick="switchTestimonialTab('pending')">Pending <span class="count" id="t-count-pending">0</span></button>
                <button type="button" class="t-tab" data-tab="approved" onclick="switchTestimonialTab('approved')">Approved <span class="count" id="t-count-approved">0</span></button>
            </div>
            <div id="testimonials-list"></div>
        </div>
    </div>

    <script>
        const API_URL = 'https://ra-photos.rapropertysolutions.net';
        let authToken = '';

        function toggleCustomCategory() {
            const select = document.getElementById('category');
            const custom = document.getElementById('customCategory');
            if (select.value === '__custom__') {
                custom.style.display = 'block';
                custom.focus();
            } else {
                custom.style.display = 'none';
                custom.value = '';
            }
        }

        function getCategory() {
            const select = document.getElementById('category');
            if (select.value === '__custom__') {
                const custom = document.getElementById('customCategory').value.trim();
                return custom.toLowerCase().replace(/\s+/g, '-') || 'general';
            }
            return select.value;
        }

        function login() {
            authToken = document.getElementById('password').value;
            fetch(API_URL + '/list', { headers: { 'Authorization': authToken } })
                .then(r => {
                    if (r.ok) {
                        document.getElementById('login-section').style.display = 'none';
                        document.getElementById('upload-section').style.display = 'block';
                        document.getElementById('testimonials-admin').style.display = 'block';
                        loadRecent();
                        loadTestimonials();
                        if (window.location.hash === '#testimonials') {
                            setTimeout(() => {
                                document.getElementById('testimonials-admin')
                                    .scrollIntoView({ behavior: 'smooth', block: 'start' });
                            }, 100);
                        }
                        return;
                    }
                    throw new Error('Wrong password');
                })
                .catch(e => {
                    document.getElementById('login-status').className = 'status error';
                    document.getElementById('login-status').textContent = 'Invalid password. Try again.';
                });
        }

        function togglePhotoType() {
            const type = document.querySelector('input[name="photoType"]:checked').value;
            document.getElementById('single-upload').style.display = type === 'single' ? 'block' : 'none';
            document.getElementById('beforeafter-upload').style.display = type === 'beforeafter' ? 'block' : 'none';
            updateUploadBtn();
        }

        function updateUploadBtn() {
            const type = document.querySelector('input[name="photoType"]:checked').value;
            if (type === 'single') {
                document.getElementById('uploadBtn').disabled = document.getElementById('files').files.length === 0;
            } else {
                const hasBefore = document.getElementById('beforeFiles').files.length > 0;
                const hasAfter = document.getElementById('afterFiles').files.length > 0;
                document.getElementById('uploadBtn').disabled = !(hasBefore && hasAfter);
            }
        }

        function setupPreview(inputId, previewId) {
            document.getElementById(inputId).addEventListener('change', function() {
                const preview = document.getElementById(previewId);
                preview.innerHTML = '';
                Array.from(this.files).forEach(file => {
                    const img = document.createElement('img');
                    img.src = URL.createObjectURL(file);
                    preview.appendChild(img);
                });
                updateUploadBtn();
            });
        }

        setupPreview('files', 'preview');
        setupPreview('beforeFiles', 'beforePreview');
        setupPreview('afterFiles', 'afterPreview');

        async function uploadFile(file, category, title, photoType) {
            const formData = new FormData();
            formData.append('file', file);
            formData.append('category', category);
            formData.append('title', title);
            formData.append('photoType', photoType);

            const res = await fetch(API_URL + '/upload', {
                method: 'POST',
                headers: { 'Authorization': authToken },
                body: formData
            });

            if (!res.ok) throw new Error('Upload failed');
        }

        async function uploadPhotos() {
            const category = getCategory();
            const title = document.getElementById('title').value.trim();
            if (!title) {
                document.getElementById('upload-status').className = 'status error';
                document.getElementById('upload-status').textContent = 'Please enter a project title.';
                return;
            }
            const type = document.querySelector('input[name="photoType"]:checked').value;
            const btn = document.getElementById('uploadBtn');
            const status = document.getElementById('upload-status');

            btn.disabled = true;
            btn.textContent = 'Uploading...';

            try {
                if (type === 'single') {
                    const files = document.getElementById('files').files;
                    status.className = 'status info';
                    status.textContent = `Uploading ${files.length} photo(s)...`;
                    for (const file of files) {
                        await uploadFile(file, category, title, 'single');
                    }
                } else {
                    const beforeFiles = document.getElementById('beforeFiles').files;
                    const afterFiles = document.getElementById('afterFiles').files;
                    const total = beforeFiles.length + afterFiles.length;
                    status.className = 'status info';
                    status.textContent = `Uploading ${total} photo(s)...`;
                    for (const file of beforeFiles) {
                        await uploadFile(file, category, title, 'before');
                    }
                    for (const file of afterFiles) {
                        await uploadFile(file, category, title, 'after');
                    }
                }

                status.className = 'status success';
                status.textContent = 'Photos uploaded successfully!';
                document.getElementById('files').value = '';
                document.getElementById('beforeFiles').value = '';
                document.getElementById('afterFiles').value = '';
                document.getElementById('preview').innerHTML = '';
                document.getElementById('beforePreview').innerHTML = '';
                document.getElementById('afterPreview').innerHTML = '';
                document.getElementById('title').value = '';
                btn.textContent = 'Upload Photos';
                btn.disabled = true;
                loadRecent();
            } catch (e) {
                status.className = 'status error';
                status.textContent = 'Upload failed. Check your connection and try again.';
                btn.textContent = 'Upload Photos';
                btn.disabled = false;
            }
        }

        let recentPhotos = [];

        async function loadRecent() {
            try {
                const res = await fetch(API_URL + '/list', { headers: { 'Authorization': authToken } });
                const data = await res.json();
                recentPhotos = data.photos;
                const container = document.getElementById('recentPhotos');

                // Group photos by title + category
                const groups = {};
                data.photos.forEach(photo => {
                    const key = photo.title + '|' + photo.category;
                    if (!groups[key]) groups[key] = { title: photo.title, category: photo.category, photos: [] };
                    groups[key].photos.push(photo);
                });

                let groupIndex = 0;
                container.innerHTML = Object.values(groups).map(group => {
                    // Sort photos by order
                    group.photos.sort((a, b) => (a.order || 0) - (b.order || 0));
                    const keys = group.photos.map(p => p.key);
                    const thumbs = group.photos.slice(0, 4).map(p =>
                        `<img src="${API_URL}/image/${p.key}" alt="${p.title}">`
                    ).join('');
                    const safeTitle = group.title.replace(/'/g, "\\'");
                    const safeKeys = encodeURIComponent(JSON.stringify(keys));
                    const gid = 'reorder-' + groupIndex;
                    const reorderItems = group.photos.map((p, i) =>
                        `<div class="reorder-item">
                            <img src="${API_URL}/image/${p.key}" alt="">
                            <div class="reorder-info">${p.photoType || 'single'}</div>
                            <div class="reorder-arrows">
                                <button onclick="movePhoto('${safeKeys}', ${i}, -1)" ${i === 0 ? 'disabled' : ''}>&#9650;</button>
                                <button onclick="movePhoto('${safeKeys}', ${i}, 1)" ${i === group.photos.length - 1 ? 'disabled' : ''}>&#9660;</button>
                            </div>
                        </div>`
                    ).join('');
                    groupIndex++;
                    return `
                        <div class="project-group">
                            <div class="project-group-header">
                                <div>
                                    <strong>${group.title}</strong>
                                    <small>${group.category} &middot; ${group.photos.length} photo${group.photos.length !== 1 ? 's' : ''}</small>
                                </div>
                                <div class="btn-group">
                                    <button class="reorder-btn" onclick="toggleReorder('${gid}')">Reorder</button>
                                    <button class="edit-btn" onclick="editGroup('${safeKeys}', '${safeTitle}')">Rename</button>
                                    <button class="delete-btn" onclick="deleteGroup('${safeKeys}', '${safeTitle}')">Delete All</button>
                                </div>
                            </div>
                            <div class="project-group-thumbs">${thumbs}${group.photos.length > 4 ? '<span class="more-count">+' + (group.photos.length - 4) + '</span>' : ''}</div>
                            <div class="reorder-photos" id="${gid}">${reorderItems}</div>
                        </div>`;
                }).join('');
            } catch(e) {}
        }

        async function editGroup(encodedKeys, currentTitle) {
            const keys = JSON.parse(decodeURIComponent(encodedKeys));
            const newTitle = prompt('Rename project:', currentTitle);
            if (newTitle === null || newTitle.trim() === '') return;
            try {
                for (const key of keys) {
                    const res = await fetch(API_URL + '/update/' + key, {
                        method: 'PUT',
                        headers: { 'Authorization': authToken, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ title: newTitle.trim() })
                    });
                    if (!res.ok) throw new Error('Update failed');
                }
                loadRecent();
            } catch(e) {
                alert('Failed to rename. Make sure you deployed the latest worker.');
            }
        }

        function toggleReorder(gid) {
            document.getElementById(gid).classList.toggle('active');
        }

        async function movePhoto(encodedKeys, index, direction) {
            const keys = JSON.parse(decodeURIComponent(encodedKeys));
            const newIndex = index + direction;
            if (newIndex < 0 || newIndex >= keys.length) return;

            // Swap the two photos' order values
            try {
                const res1 = await fetch(API_URL + '/update/' + keys[index], {
                    method: 'PUT',
                    headers: { 'Authorization': authToken, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ order: newIndex })
                });
                const res2 = await fetch(API_URL + '/update/' + keys[newIndex], {
                    method: 'PUT',
                    headers: { 'Authorization': authToken, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ order: index })
                });
                if (!res1.ok || !res2.ok) throw new Error('Update failed');
                loadRecent();
            } catch(e) {
                alert('Failed to reorder. Make sure you deployed the latest worker.');
            }
        }

        async function deleteGroup(encodedKeys, title) {
            const keys = JSON.parse(decodeURIComponent(encodedKeys));
            if (!confirm('Delete all ' + keys.length + ' photos in "' + title + '"?')) return;
            for (const key of keys) {
                await fetch(API_URL + '/delete/' + key, {
                    method: 'DELETE',
                    headers: { 'Authorization': authToken }
                });
            }
            loadRecent();
        }

        // ===== Testimonials moderation =====
        let testimonialsCache = [];
        let testimonialTab = 'pending';

        function escapeText(s) {
            return String(s == null ? '' : s).replace(/[&<>"']/g, c => (
                { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]
            ));
        }

        function renderStars(n) {
            const r = Math.max(0, Math.min(5, parseInt(n, 10) || 0));
            return '★'.repeat(r) + '☆'.repeat(5 - r);
        }

        async function loadTestimonials() {
            try {
                const res = await fetch(API_URL + '/testimonials-admin', {
                    headers: { 'Authorization': authToken }
                });
                if (!res.ok) throw new Error('failed');
                const data = await res.json();
                testimonialsCache = data.testimonials || [];
                renderTestimonials();
            } catch (e) {
                document.getElementById('testimonials-list').innerHTML =
                    '<p class="t-empty">Could not load testimonials. Make sure the latest worker is deployed.</p>';
            }
        }

        function renderTestimonials() {
            const pending = testimonialsCache.filter(t => !t.approved);
            const approved = testimonialsCache.filter(t => t.approved);
            document.getElementById('t-count-pending').textContent = pending.length;
            document.getElementById('t-count-approved').textContent = approved.length;

            const items = testimonialTab === 'pending' ? pending : approved;
            const list = document.getElementById('testimonials-list');

            if (items.length === 0) {
                list.innerHTML = `<p class="t-empty">No ${testimonialTab} testimonials.</p>`;
                return;
            }

            list.innerHTML = items.map(t => {
                const date = new Date(t.submitted).toLocaleString();
                const safeKey = encodeURIComponent(t.key);
                const isApproved = !!t.approved;
                const toggleLabel = isApproved ? 'Unapprove' : 'Approve';
                const toggleClass = isApproved ? 'edit-btn' : 'btn';
                const toggleStyle = isApproved
                    ? ''
                    : 'background:#27ae60;color:white;border:none;padding:0.3rem 0.6rem;border-radius:4px;cursor:pointer;font-size:0.8rem;width:auto';
                return `
                    <div class="t-item ${isApproved ? 'approved' : 'pending'}">
                        <div class="t-item-header">
                            <div>
                                <div class="author">${escapeText(t.author)}</div>
                                <div class="meta">${date}${t.email ? ' · ' + escapeText(t.email) : ''}</div>
                            </div>
                            <div class="stars">${renderStars(t.rating)}</div>
                        </div>
                        <div class="text">${escapeText(t.text)}</div>
                        <div class="actions">
                            <button class="${toggleClass}" style="${toggleStyle}" onclick="toggleTestimonial('${safeKey}', ${!isApproved})">${toggleLabel}</button>
                            <button class="delete-btn" onclick="deleteTestimonial('${safeKey}')">Delete</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function switchTestimonialTab(tab) {
            testimonialTab = tab;
            document.querySelectorAll('.t-tab').forEach(b => {
                b.classList.toggle('active', b.dataset.tab === tab);
            });
            renderTestimonials();
        }

        async function toggleTestimonial(safeKey, approved) {
            const key = decodeURIComponent(safeKey);
            try {
                const res = await fetch(API_URL + '/testimonials-admin/' + key, {
                    method: 'PUT',
                    headers: { 'Authorization': authToken, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ approved })
                });
                if (!res.ok) throw new Error('failed');
                loadTestimonials();
            } catch (e) {
                alert('Failed to update. Make sure the latest worker is deployed.');
            }
        }

        async function deleteTestimonial(safeKey) {
            if (!confirm('Delete this testimonial permanently?')) return;
            const key = decodeURIComponent(safeKey);
            try {
                const res = await fetch(API_URL + '/testimonials-admin/' + key, {
                    method: 'DELETE',
                    headers: { 'Authorization': authToken }
                });
                if (!res.ok) throw new Error('failed');
                loadTestimonials();
            } catch (e) {
                alert('Failed to delete. Make sure the latest worker is deployed.');
            }
        }
    </script>
